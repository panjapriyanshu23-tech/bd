  <!DOCTYPE html>
<html>
<head>
<title>System Breach...</title>
<style>
body{
margin:0;
background:black;
color:lime;
font-family:monospace;
overflow:hidden;
text-align:center;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

h1{
font-size:50px;
animation: glitch 1s infinite;
}

@keyframes glitch {
0% {text-shadow: 2px 2px red;}
25% {text-shadow: -2px -2px blue;}
50% {text-shadow: 2px -2px green;}
75% {text-shadow: -2px 2px purple;}
100% {text-shadow: 2px 2px red;}
}

#typing{
margin-top:150px;
font-size:20px;
white-space:pre-line;
}

button{
margin-top:40px;
padding:15px 30px;
background:lime;
border:none;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="typing"></div>

<h1>🎉 HAPPY BIRTHDAY BURO LEBAR 🎉</h1>

<button onclick="blast()">ACTIVATE SURPRISE</button>

<script>
// MATRIX RAIN EFFECT
var canvas = document.getElementById("matrix");
var ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

var letters = "01HACKBDROBUROLEBAR";
letters = letters.split("");

var fontSize = 14;
var columns = canvas.width/fontSize;
var drops = [];

for(var x=0; x<columns; x++)
drops[x]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="lime";
ctx.font=fontSize+"px monospace";

for(var i=0;i<drops.length;i++){
var text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}
setInterval(draw,33);

// TYPING EFFECT
let text = "🔐 Breaching Birthday Firewall...\nAccess Granted.\nTarget: Buro_Lebar.exe\nBrain Status: 3% Loading...\nSystem Override Successful.";
let i = 0;
let speed = 40;

function typeWriter(){
if(i < text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter, speed);
}
}
typeWriter();

// BUTTON SURPRISE
function blast(){
document.body.style.background="red";
alert("💀 SYSTEM FULLY HACKED 💀\nHAPPY BIRTHDAY LEGEND 🔥");
}
</script>

</body>
</html>
